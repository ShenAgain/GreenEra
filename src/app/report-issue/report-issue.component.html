<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Issue - Green Era</title>
    <link rel="stylesheet" href="report-issue.component.css">
</head>

<div class="container">
  <h2>Report Waste Management Issue</h2>

  <form (ngSubmit)="reportIssue()">
    <div class="form-group">
      <label for="issueType">Issue Type</label>
      <select [(ngModel)]="selectedIssueType" name="issueType" id="issueType" class="form-control" required>
        <option value="">Select Issue Type</option>
        <option *ngFor="let issueType of issueTypes" [value]="issueType">{{ issueType }}</option>
      </select>
    </div>

    <div class="form-group">
      <label for="issueDescription">Issue Description</label>
      <textarea [(ngModel)]="issueDescription" name="issueDescription" id="issueDescription" class="form-control" required></textarea>
    </div>

    <div class="form-group">
      <label for="issueLocation">Location</label>
      <input [(ngModel)]="issueLocation" name="issueLocation" id="issueLocation" class="form-control" required />
    </div>

    <div class="form-group">
      <label for="issueAdditionalComments">Additional Comments (Optional)</label>
      <textarea [(ngModel)]="issueAdditionalComments" name="issueAdditionalComments" id="issueAdditionalComments" class="form-control"></textarea>
    </div>

    <button type="submit" class="btn btn-primary">Report Issue</button>
  </form>

  <div *ngIf="successMessage" class="alert alert-success">
    {{ successMessage }}
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger">
    {{ errorMessage }}
  </div>
</div>
