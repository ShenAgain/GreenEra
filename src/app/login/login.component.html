<div class="login-container">
  <h2 *ngIf="isLoginMode">Login</h2>
  <h2 *ngIf="!isLoginMode">Register</h2>

  <form (ngSubmit)="onSubmit()" #authForm="ngForm">
    <!-- Toggle between Login and Register -->
    <div class="form-group">
      <label>
        <input type="radio" name="authMode" [(ngModel)]="isLoginMode" [value]="true" /> Login
      </label>
      <label>
        <input type="radio" name="authMode" [(ngModel)]="isLoginMode" [value]="false" /> Register
      </label>
    </div>

    <!-- Full Name Input for Registration -->
    <div class="form-group" *ngIf="!isLoginMode">
      <label for="fullName">Full Name</label>
      <input type="text" id="fullName" name="fullName" [(ngModel)]="fullName" required />
    </div>

    <!-- Email Input -->
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" [(ngModel)]="userEmail" required />
    </div>

    <!-- Contact Number for Registration -->
    <div class="form-group" *ngIf="!isLoginMode">
      <label for="contactNumber">Contact Number</label>
      <input type="tel" id="contactNumber" name="contactNumber" [(ngModel)]="contactNumber" required />
    </div>

    <!-- Community Name for Registration -->
    <div class="form-group" *ngIf="!isLoginMode">
      <label for="communityName">Community Name</label>
      <input type="text" id="communityName" name="communityName" [(ngModel)]="communityName" required />
    </div>

    <!-- Residential Address for Registration -->
    <div class="form-group" *ngIf="!isLoginMode">
      <label for="residentialAddress">Residential Address</label>
      <input type="text" id="residentialAddress" name="residentialAddress" [(ngModel)]="residentialAddress" required />
    </div>

    <!-- Password Input -->
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" [(ngModel)]="userPassword" required />
    </div>

    <!-- Confirm Password Input for Registration -->
    <div class="form-group" *ngIf="!isLoginMode">
      <label for="confirmPassword">Confirm Password</label>
      <input type="password" id="confirmPassword" name="confirmPassword" [(ngModel)]="confirmPassword" required />
    </div>

    <!-- Admin Registration Checkbox -->
    <div class="form-group" *ngIf="!isLoginMode">
      <label>
        <input type="checkbox" [(ngModel)]="isAdmin" name="isAdmin"> Register as Admin
      </label>
    </div>

    <!-- Submit Button -->
    <button type="submit" [disabled]="!authForm.valid" class="btn">
      {{ isLoginMode ? 'Login' : 'Register' }}
    </button>

    <!-- Error Message -->
    <div *ngIf="errorMessage" class="error-message">
      {{ errorMessage }}
    </div>
  </form>
</div>
